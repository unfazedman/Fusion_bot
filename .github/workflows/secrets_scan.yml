name: Secret Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Runs on every push/PR to catch accidental secret commits.
# Critical for a PUBLIC repo. Gitleaks checks entire git history.
# If a secret is found: push is flagged, commit must be reverted and secret rotated.

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history scan (not just latest commit)

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
