name: System Health Check

on:
  schedule:
    # Every 6 hours
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Manual trigger restricted to repo owner
    # NOTE: Public repo means any GitHub user can SEE this workflow.
    # The auth check below prevents unauthorized manual triggers.
    # Attack Scenario 3 from audit: repeated dispatch exhausts TwelveData credits.
    # This check mitigates that.

jobs:
  run-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Verify dispatch authorization
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.actor }}" != "${{ secrets.REPO_OWNER_USERNAME }}" ]; then
            echo "Unauthorized dispatch attempt by ${{ github.actor }}. Access denied."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run System Health Check
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ERROR_BOT_TOKEN:  ${{ secrets.ERROR_BOT_TOKEN }}
          ERROR_CHAT_ID:    ${{ secrets.ERROR_CHAT_ID }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          TWELVE_DATA_KEY:  ${{ secrets.TWELVE_DATA_KEY }}
          GNEWS_API_KEY:    ${{ secrets.GNEWS_API_KEY }}
        run: python system_health_check.py
