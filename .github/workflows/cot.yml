name: COT Tracker

on:
  schedule:
    # Saturdays 04:30 UTC = 10:00 AM IST
    # After CFTC releases data Friday ~3:30 PM EST (21:00 UTC)
    - cron: '30 4 * * 6'
  workflow_dispatch:
    # Manual trigger restricted to repo owner
jobs:
  run-cot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify dispatch authorization
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.actor }}" != "${{ secrets.REPO_OWNER_USERNAME }}" ]; then
            echo "Unauthorized dispatch by ${{ github.actor }}."
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run COT Tracker
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ERROR_BOT_TOKEN:  ${{ secrets.ERROR_BOT_TOKEN }}
          ERROR_CHAT_ID:    ${{ secrets.ERROR_CHAT_ID }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: python cot_tracker.py
