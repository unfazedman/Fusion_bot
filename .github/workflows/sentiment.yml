name: Sentiment Scanner

on:
  schedule:
    # Every 15 minutes on weekdays, 07:00-22:00 UTC (12:30 PM - 3:30 AM IST)
    # Covers full London + New York session
    - cron: '*/15 7-22 * * 1-5'
  workflow_dispatch:
    # Manual trigger restricted to repo owner

jobs:
  run-sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify dispatch authorization
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.actor }}" != "${{ secrets.REPO_OWNER_USERNAME }}" ]; then
            echo "Unauthorized dispatch by ${{ github.actor }}."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Sentiment Scanner
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ERROR_BOT_TOKEN:     ${{ secrets.ERROR_BOT_TOKEN }}
          ERROR_CHAT_ID:       ${{ secrets.ERROR_CHAT_ID }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          GNEWS_API_KEY:       ${{ secrets.GNEWS_API_KEY }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
        run: python sentiment_scanner.py
